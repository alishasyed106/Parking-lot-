# ParkOS — Docker Compose
# Full stack: Java/Spring Boot, Go Gateway, PostgreSQL, Redis, Kafka
# Developed by: Alisha

version: '3.9'

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: parkos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: parkos_db
      POSTGRES_USER: parkos
      POSTGRES_PASSWORD: parkos_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkos -d parkos_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parkos-net

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: parkos-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parkos-net

  # ── Zookeeper (Kafka dep) ───────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: parkos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - parkos-net

  # ── Apache Kafka ────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: parkos-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - parkos-net

  # ── Java Spring Boot API ────────────────────────────────────
  api:
    build:
      context: ./backend/java
      dockerfile: Dockerfile
    container_name: parkos-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/parkos_db
      SPRING_DATASOURCE_USERNAME: parkos
      SPRING_DATASOURCE_PASSWORD: parkos_secure_pass
      SPRING_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-256-bit}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - parkos-net
    labels:
      - "developer=Alisha"

  # ── Go Gateway ─────────────────────────────────────────────
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: parkos-gateway
    restart: unless-stopped
    depends_on:
      - redis
      - api
    environment:
      JAVA_API_URL: http://api:8080
      REDIS_ADDR: redis:6379
      PORT: 9090
    ports:
      - "9090:9090"
    networks:
      - parkos-net
    labels:
      - "developer=Alisha"

  # ── Frontend (Nginx) ────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: parkos-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - gateway
      - api
    networks:
      - parkos-net

# ── Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  parkos-net:
    driver: bridge
